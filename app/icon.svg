      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="#0D1117"/>
  <rect x="8" y="8" width="496" height="496" rx="88" fill="#111827"/>

  <!-- Grid lines -->
  <g opacity="0.2" stroke="#94A3B8" stroke-width="2">
    <path d="M96 128 H416"/>
    <path d="M96 192 H416"/>
    <path d="M96 256 H416"/>
    <path d="M96 320 H416"/>
    <path d="M96 384 H416"/>
  </g>

  <!-- Candlesticks -->
  <!-- Bullish -->
  <g>
    <line x1="160" x2="160" y1="170" y2="350" stroke="url(#g1)" stroke-width="12" stroke-linecap="round"/>
    <rect x="140" y="210" width="40" height="90" rx="6" fill="url(#g1)"/>
  </g>
  <g>
    <line x1="240" x2="240" y1="150" y2="340" stroke="url(#g1)" stroke-width="12" stroke-linecap="round"/>
